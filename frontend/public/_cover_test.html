<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#cfc8bd;font-family:sans-serif}
.grid{display:flex;flex-wrap:wrap;gap:10px;padding:10px}
.cell{background:#fff;padding:6px;border-radius:6px}
.cell div{font-size:11px;color:#444;text-align:center;margin-top:3px}
canvas{display:block;box-shadow:0 4px 12px rgba(0,0,0,.25)}
</style></head><body><div class="grid" id="g"></div>
<script>
const LONG=520;
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawCover(ctx,img,x,y,w,h){const ir=img.width/img.height,r=w/h;let sw=img.width,sh=img.height,sx=0,sy=0;if(ir>r){sw=img.height*r;sx=(img.width-sw)/2}else{sh=img.width/r;sy=(img.height-sh)/2}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
function tile(ctx,img,W,H,reps){const tw=W/reps,th=tw*(img.height/img.width);for(let yy=0;yy<H;yy+=th)for(let xx=0;xx<W;xx+=tw)ctx.drawImage(img,xx,yy,tw,th)}
function band(ctx,W,H,cy,fh,color){const y=H*(cy-fh/2),h=H*fh;ctx.save();ctx.fillStyle=color;ctx.fillRect(0,y,W,h);const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'rgba(255,255,255,0.18)');g.addColorStop(0.5,'rgba(255,255,255,0)');g.addColorStop(1,'rgba(0,0,0,0.12)');ctx.fillStyle=g;ctx.fillRect(0,y,W,h);ctx.fillStyle='rgba(0,0,0,0.10)';ctx.fillRect(0,y,W,2);ctx.fillRect(0,y+h-2,W,2);ctx.restore()}
function stone(ctx,x,y,r){ctx.save();ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.arc(x+r*0.18,y+r*0.22,r,0,Math.PI*2);ctx.fill();const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);g.addColorStop(0,'#fff');g.addColorStop(0.5,'#eef1f4');g.addColorStop(1,'#b9c0c8');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();ctx.arc(x-r*0.32,y-r*0.34,r*0.28,0,Math.PI*2);ctx.fill();ctx.restore()}
function crystalLine(ctx,x1,y1,x2,y2){const len=Math.hypot(x2-x1,y2-y1);const r=Math.max(3.5,len*0.0085);const n=Math.floor(len/(r*2.1));for(let i=0;i<n;i++){const t=(i+0.5)/n;stone(ctx,x1+(x2-x1)*t,y1+(y2-y1)*t,r)}}
function plaque(ctx,cx,cy,w,h,gold,text){ctx.save();ctx.shadowColor='rgba(0,0,0,0.28)';ctx.shadowBlur=h*0.25;ctx.shadowOffsetY=h*0.06;const g=ctx.createLinearGradient(cx-w/2,cy-h/2,cx-w/2,cy+h/2);if(gold){g.addColorStop(0,'#f0d89a');g.addColorStop(0.5,'#c79a4e');g.addColorStop(1,'#9c7430')}else{g.addColorStop(0,'#f1f2f4');g.addColorStop(0.5,'#cdd0d4');g.addColorStop(1,'#a7abb1')}ctx.fillStyle=g;roundRect(ctx,cx-w/2,cy-h/2,w,h,h*0.16);ctx.fill();ctx.restore();if(text)script(ctx,text,cx,cy,h*0.42,gold?'rgba(70,48,16,0.92)':'rgba(60,64,70,0.92)')}
function engraved(ctx,text,cx,cy,size,light){ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='500 '+size+'px Georgia,serif';ctx.fillStyle=light?'rgba(255,255,255,0.55)':'rgba(0,0,0,0.4)';ctx.fillText(text,cx+size*0.012,cy+size*0.012);ctx.fillStyle=light?'rgba(70,52,34,0.55)':'rgba(255,255,255,0.45)';ctx.fillText(text,cx-size*0.012,cy-size*0.012);ctx.fillStyle=light?'rgba(74,56,38,0.82)':'rgba(235,228,216,0.85)';ctx.fillText(text,cx,cy);ctx.restore()}
function sprig(ctx,cx,cy,r,light){ctx.save();ctx.translate(cx,cy);ctx.strokeStyle=light?'rgba(90,70,46,0.7)':'rgba(230,222,210,0.7)';ctx.lineWidth=Math.max(2,r*0.05);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,r);ctx.bezierCurveTo(r*0.2,r*0.3,-r*0.2,-r*0.3,0,-r);ctx.stroke();ctx.fillStyle='rgba(196,72,72,0.9)';for(let i=0;i<5;i++){const t=i/4;const x=Math.sin(t*5)*r*0.5;const y=r-t*2*r;heart(ctx,x,y,r*(0.16-t*0.02))}ctx.restore()}
function heart(ctx,x,y,s){ctx.save();ctx.translate(x,y);ctx.beginPath();ctx.moveTo(0,s*0.3);ctx.bezierCurveTo(s,-s*0.6,s*1.2,s*0.5,0,s);ctx.bezierCurveTo(-s*1.2,s*0.5,-s,-s*0.6,0,s*0.3);ctx.fill();ctx.restore()}
function photoBox(ctx,img,cx,cy,w,h){ctx.save();ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=h*0.06;ctx.shadowOffsetY=h*0.02;ctx.fillStyle='#fff';ctx.fillRect(cx-w/2-6,cy-h/2-6,w+12,h+12);ctx.restore();ctx.save();ctx.beginPath();ctx.rect(cx-w/2,cy-h/2,w,h);ctx.clip();if(img)drawCover(ctx,img,cx-w/2,cy-h/2,w,h);else{ctx.fillStyle='#cdc6ba';ctx.fillRect(cx-w/2,cy-h/2,w,h)}ctx.restore()}
function script(ctx,text,cx,cy,size,color){if(!text)return;ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='italic 600 '+size+'px Georgia,serif';ctx.fillStyle=color;ctx.fillText(text,cx,cy);ctx.restore()}

function base(ctx,W,H,opt){ // material base
  if(opt.wood){drawCover(ctx,opt.wood,0,0,W,H)}
  else{ctx.fillStyle=opt.color;ctx.fillRect(0,0,W,H);if(opt.grain){ctx.save();ctx.globalAlpha=0.24;ctx.globalCompositeOperation='multiply';tile(ctx,opt.grain,W,H,2);ctx.restore()}}
  const sheen=ctx.createLinearGradient(0,0,W,H);sheen.addColorStop(0,'rgba(255,255,255,0.10)');sheen.addColorStop(0.4,'rgba(255,255,255,0)');sheen.addColorStop(1,'rgba(0,0,0,0.06)');ctx.fillStyle=sheen;ctx.fillRect(0,0,W,H);
  const fold=ctx.createLinearGradient(0,0,W*0.08,0);fold.addColorStop(0,'rgba(0,0,0,0.22)');fold.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fold;ctx.fillRect(0,0,W*0.08,H);
}
function makeCell(title,aspect,paint){
  const c=document.createElement('canvas');let W,Hh;if(aspect>=1){W=LONG;Hh=Math.round(LONG/aspect)}else{Hh=LONG;W=Math.round(LONG*aspect)}
  c.width=W;c.height=Hh;const ctx=c.getContext('2d');paint(ctx,W,Hh);
  const cell=document.createElement('div');cell.className='cell';cell.appendChild(c);const lab=document.createElement('div');lab.textContent=title;cell.appendChild(lab);document.getElementById('g').appendChild(cell);
}
function load(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src})}

(async()=>{
  const [noce,alc,suade,juta,cw,couple]=await Promise.all([
    load('/textures/wood/noce.jpg'),load('/textures/materials/alcantara.jpg'),load('/textures/materials/suade.jpg'),
    load('/textures/materials/juta.jpg'),load('/textures/materials/cristalwhite.jpg'),load('/textures/demo/couple.jpg')]);
  const ink='rgba(244,238,228,0.95)',inkD='rgba(60,46,32,0.92)';
  // 1 monogram wood (Brand)
  makeCell('Brand · monogram · wood',1,(ctx,W,H)=>{base(ctx,W,H,{wood:noce});engraved(ctx,'MA',W/2,H*0.46,Math.min(W,H)*0.3,false);script(ctx,'marco & anna',W/2,H*0.46+Math.min(W,H)*0.3*0.62,Math.min(W,H)*0.3*0.16,'rgba(244,238,228,0.6)')});
  // 2 fascia-ornament wood (Thea)
  makeCell('Thea · fascia-ornament · wood',1,(ctx,W,H)=>{base(ctx,W,H,{wood:noce});band(ctx,W,H,0.46,0.22,'#efe9da');crystalLine(ctx,W*0.16,H*0.36,W*0.84,H*0.36);crystalLine(ctx,W*0.16,H*0.56,W*0.84,H*0.56);script(ctx,'Antonio e Sara',W/2,H*0.46,H*0.07,'rgba(70,52,34,0.9)')});
  // 3 photo-vertical alcantara color (Chloe)
  makeCell('Chloe · photo-vertical · alcantara',0.78,(ctx,W,H)=>{base(ctx,W,H,{color:'#7d8aa0',grain:alc});photoBox(ctx,couple,W*0.56,H*0.5,W*0.4,H*0.62);script(ctx,'Giovanni e Lucia',W*0.27,H*0.78,H*0.05,ink)});
  // 4 swarovski-line cristalwhite (Diez)
  makeCell('Diez · swarovski-line · cristalwhite',1,(ctx,W,H)=>{base(ctx,W,H,{color:'#f1ece1',grain:cw});(function(){for(let i=0;i<24;i++)stone(ctx,W*0.6,H*0.12+(H*0.76)*(i/23),5)})();plaque(ctx,W*0.34,H*0.5,W*0.4,H*0.12,false,'Loredana e Federico')});
  // 5 plate suade (Rimboccato)
  makeCell('Rimboccato · plate · suade',0.78,(ctx,W,H)=>{base(ctx,W,H,{color:'#b1a672',grain:suade});plaque(ctx,W/2,H*0.5,W*0.32,H*0.18,false,'');script(ctx,'Cristina e Antonio',W/2,H*0.74,H*0.055,ink)});
  // 6 print juta (Darling)
  makeCell('Darling · print · juta',1,(ctx,W,H)=>{base(ctx,W,H,{color:'#c9b596',grain:juta});sprig(ctx,W/2,H*0.62,Math.min(W,H)*0.16,true);script(ctx,'Francesca e Alessia',W/2,H*0.82,H*0.055,inkD)});
  document.title='READY';
})();
</script></body></html>
