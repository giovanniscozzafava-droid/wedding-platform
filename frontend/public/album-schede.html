  :root{ --ink:#2b2622; --mut:#8a8378; --line:#d8d2c6; --bg:#fbf9f4; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#e9e6df; color:var(--ink); font-family:"Helvetica Neue",Arial,sans-serif; }
  .toc{ max-width:1480px; margin:24px auto; padding:0 24px; }
  .toc h1{ font-weight:300; letter-spacing:.04em; }
  .toc a{ display:inline-block; margin:4px 8px 4px 0; padding:4px 10px; border:1px solid #bbb; border-radius:6px; text-decoration:none; color:#333; font-size:13px; }
  .sheet{
    width:1480px; height:1040px; margin:22px auto; background:var(--bg);
    border:1px solid #c9c3b6; box-shadow:0 8px 30px rgba(0,0,0,.12); padding:34px 40px; position:relative;
    page-break-after:always; display:grid; grid-template-rows:auto auto 1fr auto; gap:18px;
  }
  .hd{ border-bottom:1.5px solid var(--ink); padding-bottom:10px; }
  .hd .t{ font-size:40px; font-weight:300; letter-spacing:.06em; }
  .hd .s{ font-size:15px; color:var(--mut); margin-top:2px; }
  .lbl{ font-size:12px; letter-spacing:.18em; color:var(--mut); margin-bottom:8px; }
  .views{ display:grid; grid-template-columns:1.35fr .35fr 1.35fr; gap:30px; align-items:start; }
  .vcol{ text-align:center; }
  .vcap{ font-size:12px; letter-spacing:.16em; color:var(--mut); margin-bottom:8px; }
  /* copertina */
  .cover{ position:relative; border-radius:6px 10px 10px 6px; overflow:hidden; box-shadow:0 10px 24px rgba(0,0,0,.18);
    background-size:cover; background-position:center; }
  .spine-l{ position:absolute; left:0; top:0; bottom:0; width:7%; background-size:cover; filter:brightness(.82); box-shadow:inset -6px 0 10px rgba(0,0,0,.25); }
  .nameTxt{ position:absolute; font-family:Georgia, 'Times New Roman', serif; font-style:italic; color:rgba(40,30,22,.9); }
  .plate{ position:absolute; border-radius:4px; background:linear-gradient(135deg,#e9eaec,#b8bcc2 45%,#dfe1e4); box-shadow:0 2px 5px rgba(0,0,0,.3), inset 0 0 0 1px rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; font-size:13px; color:#3a3a3a; }
  .mono{ position:absolute; font-family:Georgia,serif; color:rgba(30,22,16,.78); text-align:center; line-height:1; }
  .sw{ position:absolute; height:10px; display:flex; align-items:center; }
  .photoIns{ position:absolute; border-radius:3px; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,.4), 0 0 0 3px rgba(255,255,255,.85);
    background-size:cover; background-position:center; }
  .spineV{ width:46px; height:300px; margin:0 auto; border-radius:18px; background-size:cover; box-shadow:inset 0 0 14px rgba(0,0,0,.35); }
  .dimrow{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:26px; align-items:center; }
  .dims b{ font-weight:600; }
  .dims div{ font-size:13px; margin:3px 0; color:#4a443c; }
  .dims .k{ color:var(--mut); }
  .bottom{ border-top:1.5px solid var(--ink); padding-top:14px; display:grid; grid-template-columns:1.1fr 1.1fr .9fr 1.1fr; gap:30px; }
  .chips{ display:flex; flex-wrap:wrap; gap:10px; }
  .chip{ width:66px; text-align:center; font-size:10.5px; color:#5a544c; }
  .chip .sw2{ width:66px; height:46px; border-radius:5px; background-size:cover; background-position:center; box-shadow:inset 0 0 0 1px rgba(0,0,0,.12); margin-bottom:4px; }
  .chip b{ display:block; font-size:11px; color:var(--ink); }
  .notes li{ font-size:12.5px; margin:5px 0; color:#4a443c; }
  .gline{ height:26px; border-radius:4px; display:flex; align-items:center; padding:0 8px; }
  svg.dieline{ width:100%; height:120px; }
  @media print{ body{background:#fff} .toc{display:none} .sheet{margin:0;box-shadow:none;border:none} }
</style>

const FMT = { square:{w:300,h:300}, portrait:{w:225,h:300}, landscape:{w:300,h:225} };
const PX = 1.12; // mm -> px scale per cover render

function bgOf(b){ if(!b) return 'background:#cdc6ba'; if(b.kind==='color') return `background:${b.hex}`; return `background-image:url(${b.tex});background-size:cover;background-position:center`; }
function spineTexOf(spec){ const b=spec.base; if(b.kind==='color') return `background:${b.hex}`; return `background-image:url(${b.tex})`; }

// row di cristalli Swarovski (SVG diamanti)
function swLine(widthPx, color='#dfe6ee'){
  const n=Math.max(8, Math.round(widthPx/9)); let d='';
  for(let i=0;i<n;i++){ const x=i*(widthPx/n)+ (widthPx/n)/2; d+=`<g transform="translate(${x.toFixed(1)},6) rotate(45)"><rect x="-3" y="-3" width="6" height="6" rx="1" fill="${color}" stroke="#9aa6b2" stroke-width=".4"/></g>`; }
  return `<svg width="${widthPx}" height="12">${d}</svg>`;
}

function renderCover(spec){
  const f=FMT[spec.fmt]; const W=f.w*PX, H=f.h*PX;
  let inner='';
  const L=spec.layout;
  const nameHtml = spec.name ? `<div class="nameTxt" style="left:0;right:0;bottom:8%;text-align:center;font-size:${W*0.045}px">${spec.name}</div>` : '';
  // fascia centrale
  if(L==='fascia'||L==='fascia-ornament'){
    const band = spec.band||{}; const bm = band.mat;
    const bandBg = bm? (bm.kind==='color'?`background:${bm.hex}`:`background-image:url(${bm.tex});background-size:cover`) : 'background:#6f7f93';
    let orn=''; if(L==='fascia-ornament'){ orn = `<svg width="100%" height="100%" style="position:absolute;inset:0;opacity:.55"><defs><pattern id="orn" width="60" height="40" patternUnits="userSpaceOnUse"><path d="M5 20 q15 -18 30 0 q15 18 25 0" stroke="${band.ornament||'#9bb06a'}" fill="none" stroke-width="2"/></pattern></defs><rect width="100%" height="100%" fill="url(#orn)"/></svg>`; }
    inner += `<div style="position:absolute;left:0;right:0;top:38%;height:24%;${bandBg};box-shadow:0 2px 6px rgba(0,0,0,.18) inset, 0 -1px 0 rgba(0,0,0,.1)">${orn}
      ${band.sw?`<div class="sw" style="left:6%;right:30%;top:50%;transform:translateY(-50%)">${swLine(W*0.62)}</div>`:''}</div>`;
    if(band.plate==='right'){ inner += `<div class="plate" style="right:6%;top:50%;transform:translateY(-50%);width:${W*0.26}px;height:${W*0.1}px;font-size:${W*0.03}px">${spec.name||''}</div>`; }
    if(band.plate==='center'){ inner += `<div class="plate" style="left:50%;top:50%;transform:translate(-50%,-50%);width:${W*0.3}px;height:${W*0.11}px"></div>`; }
  }
  // obliquo
  if(L==='oblique'){
    const sec = (spec.band&&spec.band.second)||col('#f3efe8','Cristalwhite');
    inner += `<div style="position:absolute;inset:0;background:${sec.hex||'#f3efe8'};clip-path:polygon(0 62%,100% 38%,100% 100%,0 100%)"></div>`;
    inner += `<div class="sw" style="left:0;right:0;top:50%;transform:rotate(-9deg);transform-origin:center">${swLine(W,'#dfe6ee')}</div>`;
    inner += `<div class="nameTxt" style="right:8%;bottom:16%;font-size:${W*0.05}px">${spec.name||''}</div>`;
  }
  // monogramma
  if(L==='monogram'){
    inner += `<div class="mono" style="left:0;right:0;top:34%;font-size:${W*0.16}px;${spec.monoMetal?'color:transparent;background:linear-gradient(135deg,#c9ad6a,#8a6a2a);-webkit-background-clip:text;background-clip:text;':''}">${spec.mono||''}</div>`;
    if(spec.name) inner += `<div class="nameTxt" style="left:0;right:0;top:52%;text-align:center;font-size:${W*0.035}px;letter-spacing:.15em">${spec.name}</div>`;
  }
  // plate
  if(L==='plate'){
    const pos = spec.plate==='center' ? `left:50%;top:50%;transform:translate(-50%,-50%)` : `right:8%;top:8%`;
    inner += `<div class="plate" style="${pos};width:${W*0.3}px;height:${W*0.12}px;font-size:${W*0.032}px">${spec.name||''}</div>`;
  }
  // swarovski line orizzontale + plate
  if(L==='swarovski-line'){
    inner += `<div class="sw" style="left:4%;right:4%;top:46%">${swLine(W*0.92,'#e8eef4')}</div>`;
    if(spec.plate==='top-right') inner += `<div class="plate" style="right:6%;top:14%;width:${W*0.3}px;height:${W*0.1}px;font-size:${W*0.028}px">${spec.name||''}</div>`;
  }
  // swarovski cluster (mandala/bouquet/floral)
  if(L==='swarovski-cluster'){
    let g=''; const cx=W/2, cy=H*0.42, R=W*0.13;
    for(let i=0;i<16;i++){ const a=i/16*Math.PI*2; const r=R*(0.5+(i%3)*0.28); g+=`<g transform="translate(${cx+Math.cos(a)*r},${cy+Math.sin(a)*r}) rotate(45)"><rect x="-3.5" y="-3.5" width="7" height="7" rx="1.3" fill="#eef3f8" stroke="#aab4be" stroke-width=".4"/></g>`; }
    inner += `<svg style="position:absolute;inset:0">${g}</svg>`;
    if(spec.name) inner += `<div class="nameTxt" style="left:0;right:0;bottom:18%;text-align:center;font-size:${W*0.04}px">${spec.name}</div>`;
  }
  // photo inserts
  if(L==='photo-vertical'){
    if(spec.mono) inner += `<div class="mono" style="left:10%;top:30%;text-align:left;font-size:${W*0.12}px">${spec.mono}<div style="font-size:${W*0.03}px;font-style:italic;margin-top:4px">${spec.name||''}</div></div>`;
    inner += `<div class="photoIns" style="right:8%;top:14%;width:${W*0.4}px;height:${H*0.58}px;${spec.plex?'box-shadow:0 3px 10px rgba(0,0,0,.4),0 0 0 4px rgba(220,235,245,.7),inset 0 0 30px rgba(255,255,255,.3);':''}background-image:url(${COUPLE})"></div>`;
  }
  if(L==='photo-small'){
    inner += `<div class="photoIns" style="right:16%;top:42%;width:${W*0.3}px;height:${H*0.22}px;background-image:url(${COUPLE})"></div>`;
    if(spec.name) inner += nameHtml;
  }
  if(L==='photo-panoramic'){
    inner += `<div class="photoIns" style="left:10%;right:10%;top:38%;height:${H*0.26}px;background-image:url(${COUPLE})"></div>`;
    if(spec.name) inner += `<div class="nameTxt" style="left:0;right:0;top:66%;text-align:center;font-size:${W*0.035}px">${spec.name}</div>`;
  }
  if(L==='photo-full'){
    inner += `<div style="position:absolute;inset:6%;border-radius:3px;background-image:url(${COUPLE});background-size:cover;background-position:center;box-shadow:0 0 0 4px rgba(255,255,255,.7)"></div>`;
  }
  if(L==='trilogy'){
    const s=W*0.16; for(let i=0;i<3;i++){ inner += `<div class="photoIns" style="left:${27+i*16}%;top:42%;width:${s}px;height:${s}px;background-image:url(${COUPLE})"></div>`; }
  }
  // print all-over
  if(L==='print'){
    const pc = spec.printColor||'#9bb06a';
    let pat;
    if(spec.printGeo) pat=`<pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M0 20 L20 0 L40 20 L20 40 Z" fill="none" stroke="${pc}" stroke-width="1.4"/></pattern>`;
    else pat=`<pattern id="p" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M10 40 q18 -22 36 0 M28 40 q-10 -16 0 -30" stroke="${pc}" fill="none" stroke-width="1.4" opacity=".7"/><circle cx="14" cy="14" r="2.4" fill="${pc}"/></pattern>`;
    inner += `<svg style="position:absolute;inset:0;opacity:.7" width="100%" height="100%"><defs>${pat}</defs><rect width="100%" height="100%" fill="url(#p)"/></svg>`;
    if(spec.printSposi){ inner += `<svg style="position:absolute;left:10%;top:30%" width="${W*0.18}" height="${W*0.18}" viewBox="0 0 40 40"><circle cx="14" cy="10" r="4" fill="#3a3026"/><circle cx="26" cy="11" r="4" fill="#caa"/><path d="M10 34 q4 -14 8 -16 M22 34 q6 -16 10 -14" stroke="#3a3026" fill="none" stroke-width="2"/><path d="M19 7 l1.5 2.5 l-3 0 z" fill="#c33"/></svg>`; }
    if(spec.name) inner += nameHtml;
  }
  if(L==='laser'){
    inner += `<svg style="position:absolute;inset:8%" width="84%" height="84%" viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="3" y="3" width="94" height="94" fill="none" stroke="rgba(60,44,30,.5)" stroke-width="1"/>${spec.laserFloral?'<path d="M50 18 q14 16 0 34 q-14 -18 0 -34 M30 50 q16 -10 40 0 M30 60 q16 10 40 0" stroke="rgba(60,44,30,.45)" fill="none" stroke-width="1.2"/>':''}</svg>`;
    if(spec.name) inner += nameHtml;
  }
  if(L==='plain'){ inner += nameHtml; }

  return `<div class="cover" style="width:${W}px;height:${H}px;${bgOf(spec.base)}">
    <div class="spine-l" style="${spineTexOf(spec)}"></div>${inner}</div>`;
}

function chipsHtml(items){
  return `<div class="chips">${items.map(m=>{
    const bg = m.kind==='color'?`background:${m.hex}`:`background-image:url(${m.tex})`;
    return `<div class="chip"><div class="sw2" style="${bg}"></div><b>${m.label}</b>${m.sub?m.sub:''}</div>`;
  }).join('')}</div>`;
}
function colorChips(cols){
  return `<div class="chips">${cols.map(c=>`<div class="chip"><div class="sw2" style="background:${c[0]};height:34px"></div>${c[1]}</div>`).join('')}</div>`;
}
const dieline = `<svg class="dieline" viewBox="0 0 200 110"><g fill="none" stroke="#b9b2a4" stroke-width="1"><rect x="60" y="35" width="80" height="40"/><path d="M60 35 L40 15 L160 15 L140 35 M140 75 L160 95 L40 95 L60 75 M60 35 L40 15 M60 75 L40 95 M140 35 L160 15 M140 75 L160 95"/><rect x="40" y="15" width="120" height="20" stroke-dasharray="3 3"/><rect x="40" y="75" width="120" height="20" stroke-dasharray="3 3"/></g></svg>`;

function renderSheet(spec){
  const f=FMT[spec.fmt];
  const spineBg = spineTexOf(spec);
  return `<div class="sheet" id="m-${spec.key}">
    <div class="hd"><div class="t">MODELLO ${spec.title}</div><div class="s">scheda 2D per sviluppo 3D · ${spec.cat}</div></div>
    <div>
      <div class="lbl">VISTE</div>
      <div class="views">
        <div class="vcol"><div class="vcap">FRONTE</div>${renderCover(spec)}</div>
        <div class="vcol"><div class="vcap">DORSO · 30 mm</div><div class="spineV" style="${spineBg}"></div></div>
        <div class="vcol"><div class="vcap">RETRO</div><div class="cover" style="width:${f.w*PX}px;height:${f.h*PX}px;${bgOf(spec.base)}"><div class="spine-l" style="${spineBg};left:auto;right:0;box-shadow:inset 6px 0 10px rgba(0,0,0,.25)"></div></div></div>
      </div>
    </div>
    <div class="dimrow">
      <div><div class="lbl">VISTA SUPERIORE (chiuso)</div><div style="height:30px;width:${f.w*0.7*PX}px;background:#efe9dc;border:1px solid #cfc7b6;border-radius:3px;box-shadow:inset 0 0 10px rgba(0,0,0,.12)"></div></div>
      <div class="dims"><div class="lbl">DIMENSIONI</div>
        <div><span class="k">Formato:</span> <b>${f.w}×${f.h} mm</b></div>
        <div><span class="k">Dorso:</span> 30 mm</div>
        <div><span class="k">Spessore:</span> ~35 mm</div>
        <div><span class="k">Apertura:</span> Libro piano (layflat)</div></div>
      <div><div class="lbl">SCATOLA (opz.)</div>${dieline}</div>
      <div><div class="lbl">BOX</div><div style="font-size:12px;color:#5a544c">310×310×40 mm coordinato</div></div>
    </div>
    <div class="bottom">
      <div><div class="lbl">MATERIALI / TRAMA</div>${chipsHtml(spec.materials)}</div>
      <div><div class="lbl">COLORI</div>${colorChips(spec.colors)}</div>
      <div><div class="lbl">ELEMENTI GRAFICI</div><div style="font-size:12.5px;color:#4a443c">${spec.graphic}</div></div>
      <div><div class="lbl">NOTE COSTRUTTIVE</div><ul class="notes" style="margin:0;padding-left:16px">${spec.notes.map(n=>`<li>${n}</li>`).join('')}</ul></div>
    </div>
  </div>`;
}

document.getElementById('app').innerHTML = SPECS.map(renderSheet).join('');
document.getElementById('toc').innerHTML = SPECS.map(s=>`<a href="#m-${s.key}">${s.title}</a>`).join('');
