<!DOCTYPE html>
<html lang="it">
<head><meta charset="utf-8" /><title>Conferma il tuo account Planfully</title></head>
<body style="margin:0;padding:0;background:#f5f1ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#1a1a1a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f1ea;padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;">
        <tr><td style="padding:40px 40px 24px 40px;text-align:center;background:linear-gradient(135deg,#fdf6ec 0%,#f5e8d0 100%);">
          <img src="https://planfully.it/brand/planfully-symbol.png" width="52" height="52" alt="Planfully" style="display:inline-block;border:0;" />
          <h1 style="margin:16px 0 4px 0;font-family:Georgia,serif;font-size:28px;font-weight:600;">Planfully</h1>
          <p style="margin:0;font-size:13px;color:#8a7a5f;letter-spacing:1.5px;text-transform:uppercase;">Benvenuto/a</p>
        </td></tr>
        <tr><td style="padding:36px 40px;">
          <h2 style="margin:0 0 16px 0;font-family:Georgia,serif;font-size:22px;font-weight:500;">Conferma il tuo indirizzo email</h2>
          <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#444;">
            Grazie per esserti registrato/a su Planfully. Clicca sul pulsante per confermare la tua email e attivare l'account.
          </p>
          <div style="text-align:center;margin:32px 0;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 36px;background:#c9a960;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;border-radius:10px;">Conferma email</a>
          </div>
          <p style="margin:0;font-size:12px;color:#8a7a5f;line-height:1.5;">
            Oppure: <a href="{{ .ConfirmationURL }}" style="color:#c9a960;word-break:break-all;">{{ .ConfirmationURL }}</a>
          </p>
        </td></tr>
        <tr><td style="padding:24px 40px;text-align:center;border-top:1px solid #eee5d3;">
          <p style="margin:0;font-size:12px;color:#a89878;">Planfully · planfully.it</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
